<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neighbourhood Explorer</title>

  <!-- Fonts — swap these URLs to change typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 — utility classes only -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Full-screen map — Google Maps fills this div -->
  <div id="map"></div>

  <!-- Toolbar — floating bar at the top of the screen -->
  <div id="toolbar">
    <!-- <span id="location-icon">🚇</span> -->
    <select id="location-select">
      <!-- Filled automatically from LOCATIONS in map.js -->
    </select>
  </div>

  <!-- Category filter pills — bottom-left, appear when KML loads -->
  <div data-pills-wrap id="cat-pills-panel">
    <p id="explore-prompt">Click to start exploring!</p>
    <div id="cat-pills">
      <!-- Filled automatically by map.js -->
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Map logic -->
  <script src="map.js"></script>

</body>
</html>
