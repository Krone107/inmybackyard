<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In My Backyard</title>

  <!-- Fonts — swap these URLs to change typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 — utility classes only -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Full-screen map — Google Maps fills this div -->
  <div id="map"></div>

  <!-- Toolbar — floating bar at the top of the screen -->
  <div id="toolbar">
    <!-- <span id="location-icon">🚇</span> -->
    <div class="custom-select" id="location-select-wrap">
      <button class="custom-select-trigger" id="location-trigger">
        <span id="location-label">Loading…</span>
        <svg class="custom-select-arrow" viewBox="0 0 12 8" width="12" height="8" fill="none">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <ul class="custom-select-list" id="location-list"></ul>
    </div>
  </div>

  <!-- Category filter pills — bottom-left, appear when KML loads -->
  <div data-pills-wrap id="cat-pills-panel">
    <p id="explore-prompt">Choose any category to get started!</p>
    <div id="cat-pills">
      <!-- Filled automatically by map.js -->
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Map logic -->
  <script src="map.js"></script>

</body>
</html>
